kind = "web"
previewPath = "/"
title = "ClickHouse Monitor"
version = "1.0.0"
id = "artifacts/ck-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20891

[services.development]
run = "pnpm --filter @workspace/ck-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ck-monitor", "run", "build" ]
publicDir = "artifacts/ck-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20891"
BASE_PATH = "/"
